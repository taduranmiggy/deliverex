name: Publish frontend to repo

# Deprecated: use "Deploy to Hostinger" workflow instead.
# Kept for manual runs only.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://deliverexapp.com/api
        run: |
          npm ci
          npm run build

      - name: Copy build to backend/public
        run: |
          mkdir -p backend/public/assets
          rsync -a frontend/dist/ backend/public/ \
            --exclude index.php \
            --exclude .htaccess \
            --exclude ping.php \
            --exclude storage

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public/
          if git diff --staged --quiet; then
            echo "No frontend public asset changes."
            exit 0
          fi
          git commit -m "chore: publish frontend build for Hostinger deploy"
          git push
