name: Deploy to Hostinger

# Push → build → SCP code to server → deployment.sh → health check
# No server git required (works after hPanel Git disconnect).
# Secrets: SSH_HOST, SSH_PORT, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL != '' && secrets.APP_URL || 'https://deliverexapp.com' }}
      VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || 'https://deliverexapp.com/api' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SSH secrets
        run: |
          missing=0
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "ERROR: SSH_HOST not set"; missing=1; fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then echo "ERROR: SSH_PORT not set"; missing=1; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "ERROR: SSH_USER not set"; missing=1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "ERROR: SSH_PRIVATE_KEY not set"; missing=1; fi
          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then echo "ERROR: DEPLOY_PATH not set"; missing=1; fi
          if [ "$missing" -ne 0 ]; then
            echo "See docs/DEPLOYMENT_ARCHITECTURE.md for one-time setup."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL="$VITE_API_URL" npm run build

      - name: Archive deploy artifacts
        run: |
          tar -czf frontend-dist.tar.gz -C frontend/dist .
          tar -czf app-code.tar.gz \
            --exclude='backend/vendor' \
            --exclude='backend/node_modules' \
            --exclude='backend/storage' \
            --exclude='backend/.env' \
            backend scripts deployment.sh

      - name: Upload artifacts to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "app-code.tar.gz,frontend-dist.tar.gz"
          target: "/tmp/deliverex-deploy/"
          overwrite: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          envs: APP_URL
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export APP_CODE="/tmp/deliverex-deploy/app-code.tar.gz"
            export FRONTEND_DIST="/tmp/deliverex-deploy/frontend-dist.tar.gz"
            export APP_URL="${APP_URL}"
            export DEPLOY_SHA="${{ github.sha }}"
            mkdir -p /tmp/deliverex-deploy "$DEPLOY_PATH"
            if [ ! -d "$DEPLOY_PATH" ]; then
              echo "ERROR: DEPLOY_PATH does not exist: $DEPLOY_PATH"
              exit 1
            fi
            if [ ! -f "$APP_CODE" ]; then
              echo "ERROR: Missing $APP_CODE"
              exit 1
            fi
            # Always refresh deploy scripts from CI (server may have no .git after hPanel disconnect)
            echo "Updating deploy scripts from CI tarball..."
            tar -xzf "$APP_CODE" -C "$DEPLOY_PATH" scripts deployment.sh
            chmod +x "$DEPLOY_PATH/scripts/"*.sh "$DEPLOY_PATH/deployment.sh" 2>/dev/null || true
            bash "$DEPLOY_PATH/scripts/deploy-from-ci.sh"

      - name: Verify production health
        run: bash scripts/health-check.sh "$APP_URL"
