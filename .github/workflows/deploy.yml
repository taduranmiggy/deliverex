name: Deploy to Hostinger

# Hostinger shared hosting often blocks SSH from GitHub Actions IPs.
# This workflow builds the frontend, commits assets to backend/public/, and pushes.
# The server deploys via hPanel Git (auto-pull or manual Deploy) + post-deploy script.
on:
  push:
    branches:
      - main
    paths-ignore:
      - "backend/public/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then export VITE_API_URL="https://deliverexapp.com/api"; fi
          npm ci
          VITE_API_URL="$VITE_API_URL" npm run build

      - name: Copy build to backend/public
        run: |
          mkdir -p backend/public/assets
          rsync -a frontend/dist/ backend/public/ \
            --exclude index.php \
            --exclude .htaccess \
            --exclude ping.php \
            --exclude storage

      - name: Commit and push published assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/public/
          if git diff --staged --quiet; then
            echo "No frontend asset changes to publish."
          else
            git commit -m "chore: publish frontend build for Hostinger deploy"
            git push
          fi

      - name: Trigger Hostinger deploy
        continue-on-error: true
        env:
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -n "${DEPLOY_HOOK_TOKEN:-}" ]; then
            curl -fsS --connect-timeout 20 --max-time 600 -X POST \
              -H "X-Deploy-Token: $DEPLOY_HOOK_TOKEN" \
              "https://deliverexapp.com/deploy-hook.php" 2>/dev/null && exit 0
          fi
          echo "Deploy will run via hPanel auto-deploy or cron (no action needed)."

      - name: Production health check (informational)
        continue-on-error: true
        run: |
          sleep 30
          body="$(curl -fsS --connect-timeout 20 https://deliverexapp.com/ping.php 2>/dev/null || echo 'pending')"
          echo "$body"
          if echo "$body" | grep -q 'vendor=yes'; then
            echo "Production: ready"
          else
            echo "Production: deploy in progress (hPanel auto-deploy / cron, no action needed)"
          fi
