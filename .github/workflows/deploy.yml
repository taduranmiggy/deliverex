name: Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          VITE_API_URL="${{ secrets.VITE_API_URL }}"
          if [ -z "$VITE_API_URL" ]; then VITE_API_URL="https://deliverexapp.com/api"; fi
          npm ci
          VITE_API_URL="$VITE_API_URL" npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to server
        run: |
          rsync -avz --delete \
            --filter 'P backend/vendor/' \
            --filter 'P backend/.env' \
            --filter 'P backend/storage/' \
            --exclude '.git' \
            --exclude 'backend/vendor' \
            --exclude 'backend/.env' \
            --exclude 'frontend/node_modules' \
            --exclude 'frontend/dist' \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Upload frontend build
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p /tmp/deliverex-dist"
          rsync -avz --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/deliverex-dist/"

      - name: Run deployment script on server
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "export DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}' SKIP_GIT_PULL=1 SKIP_SERVER_FRONTEND_BUILD=1 && bash '${{ secrets.DEPLOY_PATH }}/scripts/deployment.sh'"

      - name: Verify production health
        run: |
          for i in 1 2 3 4 5; do
            body="$(curl -fsS "https://deliverexapp.com/ping.php" 2>/dev/null || true)"
            echo "$body"
            echo "$body" | grep -q 'env=yes' && echo "$body" | grep -q 'vendor=yes' && exit 0
            sleep 8
          done
          echo "ERROR: ping.php still missing env or vendor after deploy" >&2
          exit 1

      - name: Fetch deployment log on failure
        if: failure()
        continue-on-error: true
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -o StrictHostKeyChecking=no \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "tail -80 '${{ secrets.DEPLOY_PATH }}/backend/storage/logs/deploy.log' 2>/dev/null || echo '(no deploy log)'"
