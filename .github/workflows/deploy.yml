name: Deploy to Hostinger

# Push → build → upload artifact → webhook → server pulls from GitHub → health check
# Hostinger often blocks inbound SSH from GitHub runners; server-initiated HTTPS pull works.
# Secrets: DEPLOY_HOOK_TOKEN (+ optional APP_URL, VITE_API_URL)
# Server shared/.deploy.secrets: GITHUB_DEPLOY_TOKEN (PAT with repo + actions:read)
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL != '' && secrets.APP_URL || 'https://deliverexapp.com' }}
      VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || 'https://deliverexapp.com/api' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOOK_TOKEN }}" ]; then
            echo "ERROR: DEPLOY_HOOK_TOKEN not set in GitHub Actions secrets."
            echo "Also add GITHUB_DEPLOY_TOKEN to server shared/.deploy.secrets (PAT: repo + actions:read)."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL="$VITE_API_URL" npm run build

      - name: Archive deploy bundle
        run: |
          mkdir -p .deploy-staging/frontend-dist
          cp -a frontend/dist/. .deploy-staging/frontend-dist/
          tar -czf deliverex-deploy.tar.gz \
            --exclude='backend/vendor' \
            --exclude='backend/node_modules' \
            --exclude='backend/storage' \
            --exclude='backend/.env' \
            backend scripts deployment.sh \
            -C .deploy-staging frontend-dist
          ls -lh deliverex-deploy.tar.gz

      - name: Upload deploy bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: deliverex-deploy
          path: deliverex-deploy.tar.gz
          retention-days: 3
          if-no-files-found: error

      - name: Queue server deploy
        run: |
          HOOK_URL="${APP_URL%/}/deploy-hook.php"
          echo "POST → ${HOOK_URL}"
          resp="$(curl -sS -w $'\n__HTTP__:%{http_code}' -X POST "$HOOK_URL" \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_HOOK_TOKEN }}" \
            --connect-timeout 30 --max-time 900 \
            -d "run_id=${{ github.run_id }}" \
            -d "sha=${{ github.sha }}" \
            -d "repo=${{ github.repository }}" 2>&1)" || true
          code="$(echo "$resp" | grep '__HTTP__:' | tail -1 | cut -d: -f2)"
          body="$(echo "$resp" | grep -v '__HTTP__:' | tr -d '\r')"
          echo "$body"
          if echo "$body" | grep -qi '<html'; then
            echo "ERROR: Got HTML — deploy-hook.php not configured correctly."
            exit 1
          fi
          if echo "$body" | grep -qE '^(forbidden|run_id required|deploy error|GITHUB_DEPLOY_TOKEN|shell disabled)'; then
            echo "ERROR: deploy-hook rejected the request."
            exit 1
          fi
          if [ "$code" = "202" ] || echo "$body" | grep -qE 'deploy queued|deploy complete'; then
            echo "Deploy accepted (HTTP ${code:-?}) — cron will apply within 1 minute."
            exit 0
          fi
          echo "ERROR: Unexpected deploy-hook response (HTTP ${code:-?})."
          exit 1

      - name: Wait for cron deploy and verify health
        env:
          EXPECTED_DEPLOY_SHA: ${{ github.sha }}
          HEALTH_CHECK_ATTEMPTS: 60
          HEALTH_CHECK_INTERVAL: 15
        run: bash scripts/health-check.sh "$APP_URL"
