name: Deploy to Hostinger

# Single deployment path: push → build → SSH → deployment.sh → health check
# Requires GitHub Secrets: SSH_HOST, SSH_PORT, SSH_USER, SSH_PRIVATE_KEY, DEPLOY_PATH
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ secrets.APP_URL != '' && secrets.APP_URL || 'https://deliverexapp.com' }}
      VITE_API_URL: ${{ secrets.VITE_API_URL != '' && secrets.VITE_API_URL || 'https://deliverexapp.com/api' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate SSH secrets
        run: |
          missing=0
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo "ERROR: SSH_HOST not set"; missing=1; fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then echo "ERROR: SSH_PORT not set"; missing=1; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo "ERROR: SSH_USER not set"; missing=1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "ERROR: SSH_PRIVATE_KEY not set"; missing=1; fi
          if [ -z "${{ secrets.DEPLOY_PATH }}" ]; then echo "ERROR: DEPLOY_PATH not set"; missing=1; fi
          if [ "$missing" -ne 0 ]; then
            echo "See docs/DEPLOYMENT_ARCHITECTURE.md for one-time setup."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          VITE_API_URL="$VITE_API_URL" npm run build

      - name: Archive frontend build
        run: tar -czf frontend-dist.tar.gz -C frontend/dist .

      - name: Upload frontend artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "frontend-dist.tar.gz"
          target: "/tmp/deliverex-deploy/"
          overwrite: true

      - name: Run deployment on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 15m
          envs: APP_URL
          script: |
            set -euo pipefail
            export DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            export FRONTEND_DIST="/tmp/deliverex-deploy/frontend-dist.tar.gz"
            export APP_URL="${APP_URL}"
            mkdir -p /tmp/deliverex-deploy
            chmod +x "$DEPLOY_PATH/scripts/"*.sh 2>/dev/null || true
            bash "$DEPLOY_PATH/scripts/deploy-from-ci.sh"

      - name: Verify production health
        run: bash scripts/health-check.sh "$APP_URL"
